name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, for example 1.0.0"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Resolve release version
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          case "$version" in
            v*) version="${version#v}" ;;
          esac
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "invalid release version: $version" >&2
            exit 1
          fi

          tag_name="v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "TAG_NAME=$tag_name" >> "$GITHUB_ENV"

      - name: Build static binaries (musl)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            alpine:3.22 sh -c '
              apk add --no-cache cmake g++ make linux-headers
              cmake -S . -B build/release \
                -DSG_BUILD_NATIVE=ON \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_EXE_LINKER_FLAGS="-static" \
                -DCMAKE_INSTALL_PREFIX=/usr/local
              cmake --build build/release -j$(nproc)
              DESTDIR=/src/staging cmake --install build/release --prefix ""
            '

      - name: Normalize staging bin
        run: |
          bin_dir="$(find staging -type f -name sgd -exec dirname {} \; | head -n 1)"
          if [ -z "$bin_dir" ]; then
            find staging -maxdepth 5 -type f | sort
            echo "sgd not found under staging" >&2
            exit 1
          fi
          if [ "$bin_dir" != "staging/bin" ]; then
            mkdir -p staging/bin
            cp -a "$bin_dir"/. staging/bin/
          fi
          test -x staging/bin/sgd
          test -x staging/bin/asg-cli

      - name: Verify binaries are static
        run: |
          for bin in staging/bin/sgd staging/bin/asg-cli; do
            file "$bin"
            if file "$bin" | grep -Eq "statically linked|static-pie linked"; then
              continue
            fi
            if ldd "$bin" 2>&1 | grep -q "not a dynamic executable"; then
              continue
            fi
            echo "$bin is not static" >&2
            exit 1
          done

      - name: Smoke test
        run: |
          staging/bin/sgd --version || true
          staging/bin/asg-install --help | head -3

      - name: Create tarball
        run: |
          mkdir -p dist
          tar czf "dist/agent-safe-guard-${VERSION}-linux-amd64.tar.gz" \
            -C staging/bin . \
            --transform 's,^\./,agent-safe-guard/,'

      - name: Package .deb
        run: |
          NFPM_VERSION=2.46.3
          NFPM_SHA256=9170d25ea056d7329def38134b2bcad98d02d221f8331610dcd619e84d28c565
          curl -sfL \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            -o /tmp/nfpm.tar.gz
          echo "${NFPM_SHA256}  /tmp/nfpm.tar.gz" | sha256sum -c -
          tar xz -C /usr/local/bin -f /tmp/nfpm.tar.gz nfpm
          chmod +x /usr/local/bin/nfpm

          nfpm pkg --packager deb \
            --target "dist/agent-safe-guard_${VERSION}_amd64.deb"

      - name: Ensure GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" \
              --target "$GITHUB_SHA" \
              --title "$TAG_NAME" \
              --notes "Agent Safe Guard $TAG_NAME"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG_NAME" \
            dist/agent-safe-guard-${VERSION}-linux-amd64.tar.gz \
            dist/agent-safe-guard_${VERSION}_amd64.deb \
            --clobber

      - name: Attest tarball provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: dist/agent-safe-guard-${{ env.VERSION }}-linux-amd64.tar.gz

      - name: Attest deb provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: dist/agent-safe-guard_${{ env.VERSION }}_amd64.deb
